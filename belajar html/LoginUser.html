<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Game8 Style</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 40px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    .login-container img {
      width: 120px;
      margin-bottom: 20px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0073e6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>
    <header>

    </header>
    <div class="login-container">
        <img src="LOGO.jpg" alt="GAZCO">
        <h2>Login</h2>
        <p>For Existing Members</p>
        <form>
        <input type="email" placeholder="Username" required="@gmail.com">
        <input type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
        </form>
        <p class:divider>Or</p>
    </div>
    <div class="flex-container">
        <div class="item" style="font-size:12px">Text kecil</div>
        <div class="item" style="font-size:30px">Text besar</div>
    </div>

</body>
</html>
